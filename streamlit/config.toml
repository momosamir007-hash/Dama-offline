# ════════════════════════════════════════════════════════════
# ⚙️ إعدادات Streamlit - لعبة الداما الكلاسيكية
# ════════════════════════════════════════════════════════════

# ─── المظهر العام ───
[theme]
primaryColor = "#FFD700"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1E2530"
textColor = "#FAFAFA"
font = "sans serif"

# ─── إعدادات الخادم ───
[server]
headless = true
maxUploadSize = 5
port = 8501
address = "0.0.0.0"
runOnSave = true
allowRunOnSave = true
fileWatcherType = "auto"
enableCORS = false
enableXsrfProtection = true
maxMessageSize = 200

# ─── إعدادات المتصفح ───
[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

# ─── إعدادات واجهة المستخدم ───
[ui]
hideTopBar = false
hideSidebarNav = true

# ─── إعدادات المسجل ───
[logger]
level = "warning"
messageFormat = "%(asctime)s %(message)s"

# ─── إعدادات التشغيل ───
[runner]
magicEnabled = true
fastReruns = true
enforceSerializableSessionState = false

# ─── إعدادات العميل ───
[client]
showErrorDetails = false
toolbarMode = "minimal"
showSidebarNavigation = false
